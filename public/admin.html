<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gurav PrintDrop — Admin</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page--wide">

    <!-- Topbar -->
    <div class="topbar">
      <div>
        <div class="header__logo" style="margin-bottom:2px">
          <svg width="18" height="18" viewBox="0 0 22 22" fill="none" aria-hidden="true">
            <rect x="1" y="1" width="20" height="20" rx="5" fill="#2563eb"/>
            <path d="M7 11.5L10 14.5L15 8.5" stroke="#fff" stroke-width="1.8"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          PrintDrop
          <span style="font-size:12px;font-weight:400;color:var(--text-3);margin-left:4px">
            Admin
          </span>
        </div>
        <p class="topbar__since" id="sinceLine">Loading…</p>
      </div>
      <button class="topbar__refresh" id="refreshBtn" aria-label="Refresh list">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Refresh
      </button>
    </div>

    <!-- Stats -->
    <div class="stats" id="statsRow">
      <div class="stat">
        <div class="stat__label">Total uploads</div>
        <div class="stat__value" id="statCount">—</div>
        <div class="stat__sub">this session</div>
      </div>
      <div class="stat">
        <div class="stat__label">Total size</div>
        <div class="stat__value" id="statSize">—</div>
        <div class="stat__sub">combined</div>
      </div>
      <div class="stat">
        <div class="stat__label">Latest upload</div>
        <div class="stat__value" id="statLatest">—</div>
        <div class="stat__sub" id="statLatestSub">&nbsp;</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap" id="tableWrap">
      <table id="uploadsTable">
        <thead>
          <tr>
            <th>File</th>
            <th>Type</th>
            <th>Size</th>
            <th>Uploader</th>
            <th>Time</th>
            <th>Folder</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- rows injected by admin.js -->
        </tbody>
      </table>
    </div>

    <!-- Empty state (shown when no uploads) -->
    <div class="empty" id="emptyState" style="display:none" aria-live="polite">
      <div class="empty__icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
             stroke="var(--border-2)" stroke-width="1.4"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <p class="empty__text">No files uploaded yet this session.</p>
    </div>

  </div><!-- .page--wide -->

  <script src="/js/admin.js"></script>
</body>
</html>
