<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gurav PrintDrop — Upload your file</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="page">

    <header class="header">
      <div class="header__logo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <rect x="1" y="1" width="20" height="20" rx="5" fill="#2563eb" />
          <path d="M7 11.5L10 14.5L15 8.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
        Gurav PrintDrop
      </div>
      <p class="header__sub">Upload one or more files and we'll handle the rest.</p>
    </header>

    <div class="card">

      <div class="upload-success" id="uploadSuccess" hidden>
        <div class="upload-success__icon" aria-hidden="true">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
        </div>
        <p class="upload-success__title">Upload successful</p>
        <p class="upload-success__message" id="uploadSuccessMessage">Your files have been sent to the print queue.</p>
        <button type="button" class="btn btn--ghost" id="uploadAgainBtn">Upload more files</button>
      </div>

      <div id="uploadForm">
      <!-- Drop zone -->
      <div class="dropzone" id="dropzone" role="region" aria-label="File upload zone">
        <input class="dropzone__input" type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.tif,.tiff,.docx,.doc,.xlsx,.xls,.pptx,.ppt" multiple
          aria-label="Select files" />
        <svg class="dropzone__icon-upload" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v9m-5 0H5a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1h-2M8 9l4-5 4 5m1 8h.01"/>
        </svg>
        <p class="dropzone__title">Click the button below to upload</p>
        <p class="dropzone__sub">Max. File Size: <span class="dropzone__weight-bold">50MB</span></p>
        <!-- Upload Button -->
        <button type="button" onclick="document.getElementById('fileInput').click()" class="btn btn--browse">
          <svg class="btn--browse__icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-width="2" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/>
          </svg>
          Browse file
        </button>
      </div>

      <!-- Selected files -->
      <div class="file-preview-list" id="filePreviewList" aria-live="polite"></div>

      <!-- Optional uploader name -->
      <div class="field">
        <label class="field__label" for="uploaderInput">Your name or email</label>
        <input class="field__input" type="text" id="uploaderInput" placeholder="e.g. Akash or akash@example.com"
          maxlength="100" autocomplete="name" />
        <p class="field__hint">Optional</p>
      </div>

      <!-- Submit button -->
      <button class="btn btn--primary" id="submitBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
        Send
      </button>

      <div class="status status--error" id="statusError" role="alert" aria-live="polite">
        <span class="status__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
        </span>
        <div class="status__text">
          <div class="status__title" id="errorTitle">Upload failed</div>
          <div id="errorDetail">Please try again.</div>
        </div>
      </div>

      </div><!-- #uploadForm -->

    </div><!-- .card -->
  </div><!-- .page -->

  <script src="/js/upload.js"></script>
</body>

</html>
